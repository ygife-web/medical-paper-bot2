# ===================================================================
# 医学論文自動収集・要約システム 設定ファイル
# ===================================================================

# --- 検索設定 ---
search:
  # 検索対象期間（過去何日分）
  days_back: 7
  # 最大取得論文数（フィルタリング前）
  max_results: 200
  # 最終選出論文数
  top_n: 10
  # Top論文の詳細要約数
  detailed_top_n: 10

# --- 専門領域名（表示・プロンプトに使用） ---
# Setupワークフローで自動設定されます
specialty_name: "循環器内科"

# --- 専門領域 ---
specialties:
  # 最優先領域
  primary:
    - heart failure
    - ischemic heart disease
    - myocardial infarction
    - coronary artery disease
    - atrial fibrillation
  # 次点で重要な領域
  secondary:
    - hypertension
    - diabetes mellitus
    - dyslipidemia
    - echocardiography
    - coronary artery disease prevention
    - cardiomyopathy
    - cardiac emergency
    - valvular heart disease
    - ventricular tachycardia
    - ventricular fibrillation

# --- 優先ジャーナル ---
journals:
  # Tier 1 - 総合医学誌（最高優先度）
  tier1:
    - "N Engl J Med"
    - "JAMA"
    - "Lancet"
    - "BMJ"
    - "Ann Intern Med"
  # Tier 2 - 循環器専門誌
  tier2:
    - "Circulation"
    - "J Am Coll Cardiol"
    - "Eur Heart J"
  # Tier 3 - その他重要誌
  tier3:
    - "JAMA Cardiol"
    - "JAMA Intern Med"
    - "Circ Res"
    - "Heart"
    - "JACC Heart Fail"
    - "Eur J Heart Fail"
    - "Heart Rhythm"
    - "Europace"

# --- 論文タイプスコア ---
study_type_scores:
  "Randomized Controlled Trial": 10
  "Meta-Analysis": 9
  "Systematic Review": 9
  "Clinical Trial": 8
  "Multicenter Study": 7
  "Observational Study": 6
  "Cohort Study": 6
  "Practice Guideline": 10
  "Guideline": 10
  "Review": 4
  "Case Reports": 1
  "Editorial": 2
  "Comment": 1
  "Letter": 1

# --- 除外する論文タイプ ---
exclude_types:
  - "Case Reports"
  - "Editorial"
  - "Comment"
  - "Letter"
  - "Published Erratum"

# --- AI要約設定 ---
ai:
  # Gemini モデル フォールバックチェーン（順に試行）
  model_chain:
    - "gemini-2.5-flash"
    - "gemini-2.5-flash-lite-preview-09-2025"
    - "gemini-2.0-flash"
  # API呼び出しタイムアウト（秒）
  timeout: 120
  # リトライ回数
  max_retries: 3
  # リトライ間隔（秒）
  retry_delay: 5

# --- 出力設定 ---
output:
  # 出力ディレクトリ
  directory: "output"
  # ファイル名フォーマット（日付は自動挿入）
  filename_format: "週刊医学論文レビュー_{date}.docx"

# --- 履歴管理 ---
history:
  # 履歴ファイルパス
  file: "history.json"
  # 履歴保持期間（日）
  retention_days: 180

# --- 臨床関連性スコア設定 ---
clinical_relevance:
  # 高臨床的価値キーワード（+5点、いずれか1つ含めばOK）
  high_value:
    - "randomized controlled trial"
    - "clinical practice guideline"
    - "treatment outcome"
    - "all-cause mortality"
    - "cardiovascular outcome"
    - "cardiovascular death"
    - "major adverse cardiovascular events"
    - "mace"
    - "heart failure hospitalization"
    - "primary endpoint"
  # 実臨床への応用性キーワード（+3点）
  practical:
    - "real-world"
    - "routine clinical"
    - "pragmatic"
    - "clinical decision"
    - "patient management"
    - "standard of care"
    - "clinical practice"
    - "clinical outcome"
  # 日本・アジア人データ（+2点）
  japan_relevant:
    - "japanese"
    - "asian"
    - "japan"
    - "east asian"

# --- 基礎研究除外フレーズ ---
# タイトル・アブストラクトにこれらが含まれ、かつ臨床ワードがない場合は除外
basic_science_exclude:
  - "in vitro"
  - "mouse model"
  - "rat model"
  - "cell line"
  - "ex vivo"
  - "murine"
  - "knockout mice"
  - "animal model"
  - "zebrafish"

# --- 曜日別テーマ設定 ---
daily_themes:
  # 月曜日
  Monday:
    specialties:
      - "heart failure"
    journals:
      - "JACC Heart Fail"
      - "Eur J Heart Fail"
      - "Circ Heart Fail"
  # 火曜日
  Tuesday:
    specialties:
      - "hypertension"
    journals:
      - "Hypertension"
      - "Am J Hypertens"
      - "J Hum Hypertens"
  # 水曜日
  Wednesday:
    specialties:
      - "dyslipidemia"
      - "lipid"
      - "cholesterol"
      - "statin"
      - "hyperlipidemia"
    journals:
      - "J Clin Lipidol"
      - "Atherosclerosis"
      - "Arterioscler Thromb Vasc Biol"
  # 木曜日
  Thursday:
    specialties:
      - "diabetes mellitus"
    journals:
      - "Diabetes Care"
      - "Diabetologia"
      - "Diabetes"
  # 金曜日
  Friday:
    specialties:
      - "ischemic heart disease"
      - "myocardial infarction"
      - "coronary artery disease"
    journals:
      - "EuroIntervention"
      - "JACC Cardiovasc Interv"
      - "Circ Cardiovasc Interv"
  # 土曜日
  Saturday:
    specialties:
      - "cardiovascular prevention"
      - "primary prevention"
      - "secondary prevention"
      - "cardiovascular risk"
      - "lifestyle intervention"
    journals:
      - "Eur J Prev Cardiol"
      - "J Am Heart Assoc"
      - "Prev Med"
  # 日曜日
  Sunday:
    specialties:
      - "arrhythmia"
      - "atrial fibrillation"
      - "ventricular tachycardia"
      - "ventricular fibrillation"
    journals:
      - "Heart Rhythm"
      - "Europace"
      - "Circ Arrhythm Electrophysiol"
